services:
  webserver:
    volumes:
      # Intelephense license files
      - ${INTELEPHENSE_LICENSE_DIR}/intelephense_license_key_00FLK8N3QY3O0EK:/root/intelephense/intelephense_license_key_00FLK8N3QY3O0EK:ro
      - ${INTELEPHENSE_LICENSE_DIR}/license.txt:/root/intelephense/license.txt:ro

      # SSH Agent Socket
      - ${SSH_AUTH_SOCK}:/run/ssh-agent

      # Mount the config to a TEMPORARY folder instead of directly into /root/.ssh/
      - ${HOME}/.ssh/config:/tmp/host_ssh_config:ro

    environment:
      - SSH_AUTH_SOCK=/run/ssh-agent

    # This entrypoint checks and safely provisions the internal config, 
    # then hands off control to the original Moodle Docker server image
    entrypoint: >
      sh -c "
      mkdir -p /root/.ssh &&
      cp /tmp/host_ssh_config /root/.ssh/config &&
      chmod 700 /root/.ssh &&
      chmod 600 /root/.ssh/config &&
      exec /usr/local/bin/docker-php-entrypoint apache2-foreground
      "
